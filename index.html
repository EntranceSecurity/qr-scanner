<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>QR Entry Scanner</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1976d2">
<link rel="apple-touch-icon" href="icon-192.png">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

<link rel="stylesheet" href="css/styles.css">

</head>

<body>

<div class="container">

```
<h2>QR Entry Scanner</h2>

<select id="authority">
    <option>Loading Authorities...</option>
</select>

<div class="input-wrapper">

    <input
        id="passcode"
        type="password"
        inputmode="numeric"
        placeholder="Passcode"
        oninput="toggleClearButton('passcode')">

    <span
        id="passcodeClear"
        class="clear-btn"
        onclick="clearField('passcode')">
        ×
    </span>

</div>

<button
    id="loginBtn"
    onclick="loginAndStart()">
    LOGIN
</button>

<div
    id="scanner"
    style="display:none;">
</div>

<br>

<button
    id="manualVerifyBtn"
    onclick="openManualVerification()"
    style="display:none;">
    MANUAL VERIFY
</button>

<button
    id="addUserMainBtn"
    onclick="openAddUserModal()"
    style="
    display:none;
    background:#4caf50;">
    ADD NEW USER
</button>

<button
    id="helpBtn"
    onclick="openHelpModal()"
    style="
    display:none;
    background:#607d8b;">
    HELP
</button>
```

</div>

<div
    id="resultScreen"
    class="result-screen">

```
<div id="resultContent"></div>
```

</div>

<div
    id="loadingScreen"
    class="result-screen">

```
<div
    style="
    width:70px;
    height:70px;
    border:8px solid #444;
    border-top:8px solid white;
    border-radius:50%;
    animation:spin 1s linear infinite;
    ">
</div>

<br>

<div class="info">
    Please wait...
</div>
```

</div>

<!-- MANUAL VERIFICATION -->

<div
    id="manualModal"
    style="
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#111;
    z-index:10000;
    padding-top:40px;
    box-sizing:border-box;">

```
<h2>Manual Verification</h2>

<div class="input-wrapper">

    <input
        id="manualUniqueId"
        type="text"
        placeholder="Unique ID"
        oninput="toggleClearButton('manualUniqueId')">

    <span
        id="manualUniqueIdClear"
        class="clear-btn"
        onclick="clearField('manualUniqueId')">
        ×
    </span>

</div>

<p>OR</p>

<div class="input-wrapper">

    <input
        id="manualName"
        type="text"
        placeholder="Name"
        oninput="toggleClearButton('manualName')">

    <span
        id="manualNameClear"
        class="clear-btn"
        onclick="clearField('manualName')">
        ×
    </span>

</div>

<select id="manualFacilitator">
    <option value="">
        Select Facilitator
    </option>
</select>

<div class="input-wrapper">

    <input
        id="manualPasscode"
        type="text"
        placeholder="Passcode"
        oninput="toggleClearButton('manualPasscode')">

    <span
        id="manualPasscodeClear"
        class="clear-btn"
        onclick="clearField('manualPasscode')">
        ×
    </span>

</div>

<br>

<button onclick="submitManualVerification()">
    VERIFY
</button>

<button onclick="closeManualVerification()">
    CANCEL
</button>
```

</div>

<!-- HELP -->

<div
    id="helpModal"
    style="
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:white;
    color:black;
    z-index:99999;
    overflow-y:auto;
    padding:20px;
    box-sizing:border-box;
    text-align:left;">

```
<div id="helpContent"></div>

<br>

<button
    onclick="closeHelpModal()"
    style="
    background:#1976d2;
    color:white;">
    CLOSE
</button>
```

</div>

<!-- ADD USER -->

<div
    id="addUserModal"
    style="
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.9);
    z-index:99999;
    overflow:auto;
    padding-top:40px;">

```
<div
    style="
    max-width:500px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;">

    <div class="input-wrapper">

        <input
            id="newName"
            type="text"
            placeholder="Name"
            oninput="toggleClearButton('newName')">

        <span
            id="newNameClear"
            class="clear-btn"
            onclick="clearField('newName')">
            ×
        </span>

    </div>

    <select id="newGender">

        <option value="">
            Select Gender
        </option>

        <option value="M">
            Male
        </option>

        <option value="F">
            Female
        </option>

    </select>

    <div class="input-wrapper">

        <input
            id="newAge"
            type="number"
            inputmode="numeric"
            placeholder="Age"
            oninput="toggleClearButton('newAge')">

        <span
            id="newAgeClear"
            class="clear-btn"
            onclick="clearField('newAge')">
            ×
        </span>

    </div>

    <select id="newFacilitator">
        <option value="">
            Loading Facilitators...
        </option>
    </select>

    <div class="input-wrapper">

        <input
            id="newPasscode"
            type="text"
            placeholder="Passcode"
            oninput="toggleClearButton('newPasscode')">

        <span
            id="newPasscodeClear"
            class="clear-btn"
            onclick="clearField('newPasscode')">
            ×
        </span>

    </div>

    <button
        id="generateIdBtn"
        onclick="generateUserId()">
        GENERATE ID
    </button>

    <div
        id="generatedId"
        style="
        font-size:24px;
        font-weight:bold;
        margin-top:15px;">
    </div>

    <button
        id="createUserBtn"
        onclick="createUser()"
        disabled
        style="
        opacity:0.5;">
        CREATE USER
    </button>

    <button
        onclick="closeAddUserModal()">
        CANCEL
    </button>

</div>
```

</div>

<!-- JAVASCRIPT -->

<script src="js/state.js"></script>

<script src="js/api.js"></script>

<script src="js/utils.js"></script>

<script src="js/audio.js"></script>

<script src="js/ui.js"></script>

<script src="js/help.js"></script>

<script src="js/scanner.js"></script>

<script src="js/auth.js"></script>

<script src="js/manualVerify.js"></script>

<script src="js/addUser.js"></script>

<script src="js/app.js"></script>

</body>
</html>
