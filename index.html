<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{

<body>

<div class="container">

<h2>QR Entry Scanner</h2>

<select id="authority">
    <option>Loading Authorities...</option>
</select>

<input
    type="password"
    id="passcode"
    placeholder="Authority Passcode">

<button onclick="loginAndStart()">
Start Scanner
</button>
    
<div id="scanner"></div>
<br>

<button onclick="openManualVerification()">
MANUAL VERIFY
</button>
    
<button
id="addUserMainBtn"
onclick="openAddUserModal()"
style="display:none;background:#4caf50;">
ADD NEW USER
</button>
</div>

<div id="resultScreen" class="result-screen">
    <div id="resultContent"></div>
</div>
<div id="loadingScreen" class="result-screen">
    <div class="big-status">⏳</div>
    <div class="info">Verifying...</div>
</div>
    
<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbw_bogQZURolh4hprKCW6ojQgJzZhH3DGT9qHFysVRSh77FZWPM1y1R6gHdHfc0PWdFdw/exec";

let html5QrCode = null;
let currentAuthority = "";
let isProcessing = false;
let lastScan = "";
let lastScanTime = 0;
setInterval(() => {
    fetch(
        API_URL +
        "?action=ping"
    ).catch(()=>{});

}, 300000);

function showVerifiedUser(res){

    const screen =
    document.getElementById(
      "resultScreen"
    );

    screen.className =
    "result-screen approved";

    document.getElementById(
      "resultContent"
    ).innerHTML = `

        <div class="big-status">
        ✓ VERIFIED
        </div>

        <div class="info">
        ${res.name}
        </div>

        <div class="info">
        ${res.id}
        </div>

        <br>

        <img
        src="https://quickchart.io/qr?text=${encodeURIComponent(res.id)}&size=400"
        style="
            width:280px;
            background:white;
            padding:10px;
            border-radius:12px;
        ">

        <br><br>

        <button
        onclick="continueScanning()">
        CONTINUE
        </button>

    `;

    screen.style.display =
    "flex";

}
/*
--------------------------------------------------
LOAD AUTHORITIES
--------------------------------------------------
*/

loadFacilitators();

function loadFacilitators(){

    fetch(
        API_URL +
        "?action=facilitators"
    )
    .then(r => r.json())
    .then(data => {

        const ddl =
        document.getElementById(
            "newFacilitator"
        );

        ddl.innerHTML =
        '<option value="">Select Facilitator</option>';

        data.facilitators.forEach(f => {

            ddl.innerHTML +=
            `<option value="${f}">
                ${f}
            </option>`;

        });

    });

}
    
loadAuthorities();

function loadAuthorities(){

    fetch(API_URL + "?action=authorities")
    .then(r => r.json())
    .then(data => {

        const ddl =
        document.getElementById("authority");

        ddl.innerHTML =
        '<option value="">Select Security Authority</option>';

        data.authorities.forEach(a => {

            ddl.innerHTML +=
            `<option value="${a}">${a}</option>`;

        });

    });

}

/*
--------------------------------------------------
LOGIN
--------------------------------------------------
*/

function loginAndStart(){

    const authority =
    document.getElementById("authority").value;

    const passcode =
    document.getElementById("passcode").value;

    if(!authority){
        alert("Select Security Authority");
        return;
    }

    if(!passcode){
        alert("Enter Passcode");
        return;
    }

    fetch(
        API_URL +
        "?action=login" +
        "&authority=" + encodeURIComponent(authority) +
        "&passcode=" + encodeURIComponent(passcode)
    )
    .then(r => r.json())
    .then(res => {

        if(res.status === "AUTHORIZED"){

            currentAuthority = authority;
        
            startScanner();
        
            document
            .getElementById(
              "addUserMainBtn"
            )
            .style.display = "inline-block";
        
        }else{

            alert("Invalid Authority Passcode");

        }

    });

}

/*
--------------------------------------------------
START SCANNER
--------------------------------------------------
*/

function startScanner(){

    document.getElementById("authority").disabled=true;
    document.getElementById("passcode").disabled=true;

    html5QrCode =
    new Html5Qrcode("scanner");

    html5QrCode.start(

        { facingMode: "environment" },

        {
            fps:10,
            qrbox:250
        },

        onScanSuccess

    );

}

/*
--------------------------------------------------
SCAN
--------------------------------------------------
*/

function onScanSuccess(decodedText){
    
    if(isProcessing) return;

    const now = Date.now();

    if(
        decodedText === lastScan &&
        (now - lastScanTime) < 3000
    ){
        return;
    }

    lastScan = decodedText;
    lastScanTime = now;

    isProcessing = true;
    if(navigator.vibrate){
        navigator.vibrate(50);
    }
    document.getElementById(
        "loadingScreen"
    ).style.display = "flex";
    
    const startTime = performance.now();
    
    fetch(
        API_URL +
        "?action=scan" +
        "&id=" + encodeURIComponent(decodedText.trim()) +
        "&authority=" + encodeURIComponent(currentAuthority)
    )
    .then(r => r.json())
    .then(res => {
    
        console.log(
            "API Time:",
            Math.round(
                performance.now() - startTime
            ) + " ms"
        );
    
        showResult(res);
    
    })
    .catch(err => {
    
        alert("Scan Error: " + err);
    
        isProcessing = false;
    
    });

}
/*
--------------------------------------------------
RESULT UI
--------------------------------------------------
*/

function showResult(res){
    if(!res){
        console.error("Empty response");
        return;
    }
    
    document.getElementById(
        "loadingScreen"
    ).style.display = "none";
    const screen =
    document.getElementById("resultScreen");

    const content =
    document.getElementById("resultContent");

    if(
       res.status === "APPROVED"
    ){

        playSuccess();

        screen.className =
        "result-screen approved";

        content.innerHTML = `

            <div class="big-status">
            ✓ APPROVED
            </div>

            <div class="info">
            Unique ID: ${res.id}
            </div>

            <div class="info">
            Name: ${res.name}
            </div>

            <div class="info">
            Facilitator: ${res.facilitator}
            </div>

            <div class="info">
            Passcode: ${res.passcode}
            </div>

            <div class="info">
            Authority: ${currentAuthority}
            </div>

            <br><br>

            <button
                onclick="continueScanning()"
                style="
                    padding:16px 40px;
                    font-size:22px;
                    border:none;
                    border-radius:12px;
                    background:white;
                    color:black;
                    font-weight:bold;
                    cursor:pointer;
                ">
                CONTINUE
            </button>

        `;

    }else{

        playFailure();

        screen.className =
        "result-screen denied";

        content.innerHTML = `

            <div class="big-status">
            ✖ DENIED
            </div>
        
            <div class="info">
            Unknown QR Code
            </div>
        
            <div class="info">
            ${res.id}
            </div>
        
            <br><br>
        
            <button
                onclick="continueScanning()"
                style="
                    padding:16px 40px;
                    font-size:22px;
                    border:none;
                    border-radius:12px;
                    background:white;
                    color:black;
                    font-weight:bold;
                ">
                CONTINUE
            </button>
        
        `;

    }

    screen.style.display = "flex";

}

function showUserCreated(res){

    const screen =
    document.getElementById(
      "resultScreen"
    );

    const content =
    document.getElementById(
      "resultContent"
    );

    screen.className =
    "result-screen created";

    content.innerHTML = `

        <div class="info">
        Take screenshot and provide QR to user

        <br><br>

        <button
        onclick="continueScanning()"

    `;

}
function continueScanning(){

    document.getElementById(
      "resultScreen"
    ).style.display = "none";

    isProcessing = false;

    lastScan = "";

    setTimeout(() => {

        window.scrollTo(
            0,
            0
        );

    }, 100);

}


/*
--------------------------------------------------
SUCCESS BEEP
--------------------------------------------------
*/

function playSuccess(){

    const ctx =
    new(window.AudioContext ||
    window.webkitAudioContext)();

    const osc =
    ctx.createOscillator();

    const gain =
    ctx.createGain();

    osc.type="sine";
    osc.frequency.value=900;

    osc.connect(gain);
    gain.connect(ctx.destination);

    gain.gain.value=0.3;

    osc.start();

    osc.stop(ctx.currentTime + 0.15);

}

function openManualVerification(){

    document.getElementById(
        "manualModal"
    ).style.display = "block";

}

function closeManualVerification(){

    document.getElementById(
        "manualModal"
    ).style.display = "none";

}

function submitManualVerification(){

    const uniqueId =
    document.getElementById(
        "manualUniqueId"
    ).value.trim();

    const name =
    document.getElementById(
        "manualName"
    ).value.trim();

    const facilitator =
    document.getElementById(
        "manualFacilitator"
    ).value.trim();

    const passcode =
    document.getElementById(
        "manualPasscode"
    ).value.trim();

    document.getElementById(
      "busyOverlay"
    ).style.display = "flex";

    fetch(
        API_URL +
        "?action=manualVerify" +
        "&uniqueId=" + encodeURIComponent(uniqueId) +
        "&name=" + encodeURIComponent(name) +
        "&facilitator=" + encodeURIComponent(facilitator) +
        "&passcode=" + encodeURIComponent(passcode) +
        "&authority=" + encodeURIComponent(currentAuthority)
    )
    .then(r => r.json())
    .then(res => {

        document.getElementById(
          "busyOverlay"
        ).style.display = "none";

        closeManualVerification();

        if(res.status === "APPROVED"){

            const screen =
            document.getElementById(
              "resultScreen"
            );

            const content =
            document.getElementById(
              "resultContent"
            );

            screen.className =
            "result-screen approved";

            content.innerHTML = `

                <div class="big-status">
                ✓ VERIFIED
                </div>

                <div class="info">
                Unique ID: ${res.id}
                </div>

                <div class="info">
                Name: ${res.name}
                </div>

                <div class="info">
                Facilitator: ${res.facilitator}
                </div>

                <div class="info">
                Passcode: ${res.passcode}
                </div>

                <br>

                <img
                src="https://quickchart.io/qr?text=${encodeURIComponent(res.id)}&size=400"
                style="
                    width:280px;
                    background:white;
                    padding:10px;
                    border-radius:12px;
                ">

                <br><br>

                <div class="info">
                Take Screenshot if QR needs re-printing
                </div>

                <br><br>

                <button
                onclick="continueScanning()"
                style="
                    padding:16px 40px;
                    font-size:22px;
                    border:none;
                    border-radius:12px;
                    background:white;
                    color:black;
                    font-weight:bold;
                    cursor:pointer;
                ">
                CONTINUE
                </button>

            `;

            screen.style.display =
            "flex";

        }else{

            showResult(res);

        }

    })
    .catch(err => {

        document.getElementById(
          "busyOverlay"
        ).style.display = "none";

        alert(
          "Verification Error: " + err
        );

    });

}
/*
--------------------------------------------------
FAILURE ALARM
--------------------------------------------------
*/

function playFailure(){

    const ctx =
    new(window.AudioContext ||
    window.webkitAudioContext)();

    [0,0.25,0.5].forEach(offset => {

        const osc =
        ctx.createOscillator();

        const gain =
        ctx.createGain();

        osc.type="sawtooth";
        osc.frequency.value=750;

        osc.connect(gain);
        gain.connect(ctx.destination);

        gain.gain.setValueAtTime(
            0.4,
            ctx.currentTime + offset
        );

        gain.gain.exponentialRampToValueAtTime(
            0.01,
            ctx.currentTime + offset + 0.18
        );

        osc.start(
            ctx.currentTime + offset
        );

        osc.stop(
            ctx.currentTime + offset + 0.18
        );

    });

}

let suggestedUserId = "";

function openAddUserModal(){

    suggestedUserId = "";

    document.getElementById(
      "generatedId"
    ).innerHTML = "";

    document.getElementById(
      "newName"
    ).value = "";

    document.getElementById(

    document.getElementById(
      "newAge"

    document.getElementById(
      "newPasscode"

    ).disabled = true;

    document.getElementById(
      "createUserBtn"
    ).style.opacity = "0.5";

      "addUserModal"
    ).style.display = "block";

}
function closeAddUserModal(){

    document
        .getElementById(
          "addUserModal"
        )
        .style.display = "none";
    
    }
    
function generateUserId(){

    const name =
    document.getElementById(
      "newName"
    ).value.trim();

    const facilitator =
    document.getElementById(
      "newFacilitator"
    ).value.trim();

    const gender =
    document.getElementById(
      "newGender"
    ).value.trim();

    const age =
    document.getElementById(
      "newAge"
    ).value.trim();

    const passcode =
    document.getElementById(
      "newPasscode"
    ).value.trim();

    if(
      !name ||
      !facilitator ||
      !gender ||
      !age ||
      !passcode
    ){

        alert(
          "Please complete all fields."
        );

        return;

    }

    document.getElementById(
      "generateIdBtn"
    ).disabled = true;

    document.getElementById(
      "busyOverlay"
    ).style.display = "flex";

    fetch(
      API_URL +
      "?action=generateUserId" +
      "&name=" +
      encodeURIComponent(name) +
      "&facilitator=" +
      encodeURIComponent(facilitator)
    )
    .then(r => r.json())
    .then(res => {

        console.log(res);

        document.getElementById(
          "busyOverlay"
        ).style.display = "none";

        document.getElementById(
          "generateIdBtn"
        ).disabled = false;

        if(!res.uniqueId){

            alert(
              res.error ||
              "Unable to generate ID"
            );

            return;

        }

        suggestedUserId =
        res.uniqueId;

        document
        .getElementById(
          "generatedId"
        )
        .innerHTML = `
            <h3>
            Generated ID
            </h3>

            <div style="
                font-size:24px;
                font-weight:bold;
                color:#0f9d58;
            ">
                ${res.uniqueId}
            </div>
        `;

        document
        .getElementById(
          "createUserBtn"
        )
        .disabled = false;

        document
        .getElementById(
          "createUserBtn"
        )
        .style.opacity = "1";

    })
    .catch(err => {

        document.getElementById(
          "busyOverlay"
        ).style.display = "none";

        document.getElementById(
          "generateIdBtn"
        ).disabled = false;

        alert(
          "Error: " + err
        );

    });

}

function createUser(){

    if(!suggestedUserId){

        alert(
          "Please Generate ID first"
        );

        return;
    }

    document.getElementById(
      "busyOverlay"
    ).style.display = "flex";

    document.getElementById(
      "createUserBtn"
    ).disabled = true;

    fetch(
      API_URL +
      "?action=addUser" +
      "&uniqueId=" +
      encodeURIComponent(
        suggestedUserId
      ) +
      "&name=" +
      encodeURIComponent(
        document.getElementById(
          "newName"
        ).value
      ) +
      "&gender=" +
      encodeURIComponent(
        document.getElementById(
          "newGender"
        ).value
      ) +
      "&age=" +
      encodeURIComponent(
        document.getElementById(
          "newAge"
        ).value
      ) +
      "&facilitator=" +
      encodeURIComponent(
        document.getElementById(
          "newFacilitator"
        ).value
      ) +
      "&passcode=" +
      encodeURIComponent(
        document.getElementById(
          "newPasscode"
        ).value
      )
    )
    .then(r => r.json())
    .then(res => {

        document.getElementById(
          "busyOverlay"
        ).style.display = "none";

        document.getElementById(
          "createUserBtn"
        ).disabled = false;

        if(res.status !== "CREATED"){

            alert(
              res.error ||
              "User creation failed"
            );

            return;

        }

        closeAddUserModal();

        const screen =
        document.getElementById(
          "resultScreen"
        );

        const content =
        document.getElementById(
          "resultContent"
        );

        screen.className =
        "result-screen created";

        content.innerHTML = `

            <div class="big-status">
            ✓ USER CREATED
            </div>

            <div class="info">
            Unique ID
            </div>

            <div
            style="
              font-size:28px;
              font-weight:bold;
              margin-top:10px;
            ">
            ${res.uniqueId}
            </div>

            <br>

            <img
            src="https://quickchart.io/qr?text=${encodeURIComponent(res.uniqueId)}&size=400"
            style="
              width:280px;
              background:white;
              padding:10px;
              border-radius:12px;
            ">

            <br><br>

            <div class="info">
            Take Screenshot and provide QR to user
            </div>

            <br><br>

            <button
            onclick="continueScanning()"
            style="
                padding:16px 40px;
                font-size:22px;
                border:none;
                border-radius:12px;
                background:white;
                color:black;
                font-weight:bold;
                cursor:pointer;
            ">
            CONTINUE
            </button>

        `;

        screen.style.display =
        "flex";

    })
    .catch(err => {

        document.getElementById(
          "busyOverlay"
        ).style.display = "none";

        document.getElementById(
          "createUserBtn"
        ).disabled = false;

        alert(
          "Error: " + err
        );

    });

}
    
</script>
