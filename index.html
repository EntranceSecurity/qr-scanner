const API_URL =
"https://script.google.com/macros/s/AKfycbw_bogQZURolh4hprKCW6ojQgJzZhH3DGT9qHFysVRSh77FZWPM1y1R6gHdHfc0PWdFdw/exec";

let html5QrCode = null;
let currentAuthority = "";
let isProcessing = false;
let lastScan = "";
let lastScanTime = 0;
let audioCtx = null;
    
const USER_GUIDE_HTML = `

Version 1.0

setInterval(() => {
    fetch(
        API_URL +
        "?action=ping"
    ).catch(()=>{});

}, 300000);

function showBusy(message){

    document.getElementById(
      "loadingScreen"
    ).style.display = "flex";

    document.querySelector(
      "#loadingScreen .info"
    ).innerText =
    message || "Please wait...";

}

function hideBusy(){

    document.getElementById(
      "loadingScreen"
    ).style.display = "none";

}
function showMultipleMatches(res){

    window.multipleMatches = res.matches;

    const screen =
    document.getElementById(
      "resultScreen"
    );

    screen.className =
    "result-screen approved";

    let html = `
        <div class="big-status">
        MULTIPLE MATCHES
        </div>

        <div class="info">
        Select the correct user
        </div>

        <br>
    `;

    res.matches.forEach((user,index) => {

        html += `
            <button
            style="
                width:90%;
                margin:10px;
                padding:20px;
                font-size:18px;
                background:white;
                color:black;
                border-radius:12px;
            "
            onclick="selectMatchedUser(${index})">
                <b>${user.name}</b><br>
                ${user.id}
            </button>
        `;

    });

    html += `
        <br>

        onclick="continueScanning()">

    `;

    ).innerHTML = html;

/*
--------------------------------------------------
LOAD AUTHORITIES
--------------------------------------------------
*/

loadFacilitators();

function loadFacilitators(){

    fetch(
      API_URL +
      "?action=facilitators"
    )
    .then(r => r.json())
    .then(data => {

        const addUserDDL =
        document.getElementById(
          "newFacilitator"
        );

        const manualDDL =
        document.getElementById(
          "manualFacilitator"
        );

        if(addUserDDL){

            addUserDDL.innerHTML =
            '<option value="">Select Facilitator</option>';

            data.facilitators.forEach(f => {

                addUserDDL.innerHTML +=
                `<option value="${f}">${f}</option>`;

            });

        }

        if(manualDDL){

            manualDDL.innerHTML =
            '<option value="">Select Facilitator</option>';

            data.facilitators.forEach(f => {

                manualDDL.innerHTML +=
                `<option value="${f}">${f}</option>`;

            });

        }

    });

}
    
loadAuthorities();

function loadAuthorities(){

    fetch(API_URL + "?action=authorities")
    .then(r => r.json())
    .then(data => {

        const ddl =
        document.getElementById("authority");

        ddl.innerHTML =
        '<option value="">Select Security Authority</option>';

        data.authorities.forEach(a => {

            ddl.innerHTML +=
            `<option value="${a}">${a}</option>`;

        });

    });

}
    
function selectMatchedUser(index){

    const user =
    window.multipleMatches[index];

    showBusy(
      "Confirming User..."
    );

    fetch(
        API_URL +
        "?action=confirmManualMatch" +
        "&uniqueId=" +
        encodeURIComponent(user.id) +
        "&authority=" +
        encodeURIComponent(currentAuthority)
    )
    .then(r => r.json())
    .then(res => {

        hideBusy();

        showVerifiedUser(res);

    })
    .catch(err => {

        hideBusy();

        alert(
          "Verification Error: " + err
        );

    });

}
/*
--------------------------------------------------
LOGIN
--------------------------------------------------
*/

function loginAndStart(){

    const authority =
    document.getElementById(
      "authority"
    ).value;

    const passcode =
    document.getElementById(
      "passcode"
    ).value;

    if(!authority){

        alert(
          "Select Security Authority"
        );

        return;
    }

    if(!passcode){

        alert(
          "Enter Passcode"
        );

        return;
    }

    showBusy(
      "Authenticating..."
    );

    document
    .getElementById(
      "loginBtn"
    )
    .disabled = true;

    fetch(
        API_URL +
        "?action=login" +
        "&authority=" +
        encodeURIComponent(authority) +
        "&passcode=" +
        encodeURIComponent(passcode)
    )
    .then(r => r.json())
    .then(res => {

        hideBusy();

        document
        .getElementById(
          "loginBtn"
        )
        .disabled = false;

        if(
          res.status ===
          "AUTHORIZED"
        ){
            await unlockAudio();

            currentAuthority =
            authority;

            // Hide login controls

            document
            .getElementById(
              "authority"
            )
            .style.display =
            "none";

            document
            .getElementById(
              "passcode"
            )
            .style.display =
            "none";

            document
            .getElementById(
              "loginBtn"
            )
            .style.display =
            "none";

            // Show post-login buttons

            document
            .getElementById(
              "manualVerifyBtn"
            )
            .style.display =
            "inline-block";

            document
            .getElementById(
              "addUserMainBtn"
            )
            .style.display =
            "inline-block";

            document
            .getElementById(
              "helpBtn"
            )
            .style.display =
            "inline-block";

            // Start scanner

            startScanner();

        }else{

            alert(
              "Invalid Authority Passcode"
            );

        }

    })
    .catch(err => {

        hideBusy();

        document
        .getElementById(
          "loginBtn"
        )
        .disabled = false;

        alert(
          "Login Error: " + err
        );

    });

}

/*
--------------------------------------------------
START SCANNER
--------------------------------------------------
*/

function startScanner(){

    document.getElementById(
      "scanner"
    ).style.display = "block";

    document.getElementById(
      "authority"
    ).disabled = true;

    document.getElementById(
      "passcode"
    ).disabled = true;

    html5QrCode =
    new Html5Qrcode("scanner");

    html5QrCode.start(

        { facingMode: "environment" },

        {
            fps:10,
            qrbox:250
        },

        onScanSuccess

    );

    setInterval(async ()=>{

    try{

        const video =
        document.querySelector(
          "#scanner video"
        );

        if(!video) return;

        const t1 =
        video.currentTime;

        setTimeout(async ()=>{

            if(!video) return;

            const t2 =
            video.currentTime;

            if(
                html5QrCode?.isScanning &&
                t1 === t2
            ){

                console.log(
                  "Frozen video detected"
                );

                try{

                    await html5QrCode.stop();

                    await html5QrCode.start(
                        {
                            facingMode:"environment"
                        },
                        {
                            fps:10,
                            qrbox:250
                        },
                        onScanSuccess
                    );

                }catch(err){

                    console.log(err);

                }

            }

        },3000);

    }catch(err){

        console.log(err);

    }

},30000);
}

/*
--------------------------------------------------
SCAN
--------------------------------------------------
*/

function onScanSuccess(decodedText){
    console.log(
      "SCAN DETECTED",
      decodedText
    );
    if(isProcessing) return;

    const now = Date.now();

    if(
        decodedText === lastScan &&
        (now - lastScanTime) < 3000
    ){
        return;
    }

    lastScan = decodedText;
    lastScanTime = now;

    isProcessing = true;
    if(navigator.vibrate){
        navigator.vibrate(50);
    }
    showBusy(
      "Verifying QR Code..."
    );
    
    const startTime = performance.now();
    
    fetch(
        API_URL +
        "?action=scan" +
        "&id=" + encodeURIComponent(decodedText.trim()) +
        "&authority=" + encodeURIComponent(currentAuthority)
    )
    .then(r => r.json())
    .then(res => {
    
        console.log(
            "API Time:",
            Math.round(
                performance.now() - startTime
            ) + " ms"
        );
    
        showResult(res);
    
    })
    .catch(err => {
    
        alert("Scan Error: " + err);
    
        isProcessing = false;
    
    });

}
/*

RESULT UI
--------------------------------------------------

function getAudioContext(){

    if(!audioCtx){

        audioCtx =
        new(
            window.AudioContext ||
            window.webkitAudioContext
        )();

    }

    return audioCtx;

}

async function unlockAudio(){

    const ctx = getAudioContext();

    if(ctx.state === "suspended"){

        try{
            await ctx.resume();
        }catch(e){
            console.log(e);
        }

    }

}

/*
--------------------------------------------------
SUCCESS BEEP
--------------------------------------------------
*/
function playCreated(){

    const ctx =
    getAudioContext();

    if(ctx.state === "suspended"){
        ctx.resume();
    }
    
    const notes =
    [523,659,784];

    notes.forEach((freq,index)=>{

        const osc =
        ctx.createOscillator();

        const gain =
        ctx.createGain();

        osc.type = "sine";
        osc.frequency.value = freq;

        osc.connect(gain);
        gain.connect(ctx.destination);

        gain.gain.setValueAtTime(
            0.25,
            ctx.currentTime + index * 0.12
        );

        gain.gain.exponentialRampToValueAtTime(
            0.01,
            ctx.currentTime + index * 0.12 + 0.18
        );

        osc.start(
            ctx.currentTime + index * 0.12
        );

        osc.stop(
            ctx.currentTime + index * 0.12 + 0.18
        );

    });

}
    
function playSuccess(){

    const ctx = getAudioContext();

    if(ctx.state === "suspended"){
        ctx.resume();
    }
    
    const osc =
    ctx.createOscillator();

    const gain =
    ctx.createGain();

    osc.type = "sine";
    osc.frequency.value = 900;

    osc.connect(gain);
    gain.connect(ctx.destination);

    gain.gain.value = 0.3;

    osc.start();

    osc.stop(
        ctx.currentTime + 0.15
    );

}

        "manualUniqueId"
    ).value = "";

    document.getElementById(
        "manualName"
    ).value = "";

    document.getElementById(
        "manualFacilitator"
    ).value = "";

    document.getElementById(
        "manualPasscode"
    ).value = "";

    document.getElementById(
        "manualModal"
    ).style.display = "block";

}

function closeManualVerification(){

    document.getElementById(
        "manualUniqueId"
    ).value = "";

    document.getElementById(
        "manualName"
    ).value = "";

    document.getElementById(
        "manualFacilitator"
    ).value = "";

    document.getElementById(
        "manualPasscode"
    ).value = "";

    document.getElementById(
        "manualModal"
    ).style.display = "none";

}
    
function submitManualVerification(){

    const uniqueId =
    document.getElementById(
        "manualUniqueId"
    ).value.trim();

    const name =
    document.getElementById(
        "manualName"
    ).value.trim();

    const facilitator =
    document.getElementById(
        "manualFacilitator"
    ).value.trim();

    const passcode =
    document.getElementById(
        "manualPasscode"
    ).value.trim();

    closeManualVerification()
    
    showBusy(
      "Verifying User..."
    );

    setTimeout(() => {
        fetch(
            API_URL +
            "?action=manualVerify" +
            "&uniqueId=" + encodeURIComponent(uniqueId) +
            "&name=" + encodeURIComponent(name) +
            "&facilitator=" + encodeURIComponent(facilitator) +
            "&passcode=" + encodeURIComponent(passcode) +
            "&authority=" + encodeURIComponent(currentAuthority)
        )
        .then(r => r.json())
        .then(res => {
    
            hideBusy();
    
            closeManualVerification();
    
            if(res.status === "APPROVED"){

                showVerifiedUser(res);
            
            }
            else if(res.status === "MULTIPLE_MATCHES"){

                showMultipleMatches(res);
            
            }
            else{
    
                showResult(res);
    
            }
    
        })
        .catch(err => {
    
            hideBusy();
            alert(
              "Verification Error: " + err
            );
    
        });
    }, 50);

}
/*
--------------------------------------------------
FAILURE ALARM
--------------------------------------------------
*/

function playFailure(){

    const ctx =
    getAudioContext();
    
    if(ctx.state === "suspended"){
        ctx.resume();
    }

    [0,0.25,0.5].forEach(offset => {

        const osc =
        ctx.createOscillator();

        const gain =
        ctx.createGain();

        osc.type = "sawtooth";
        osc.frequency.value = 750;

        osc.connect(gain);
        gain.connect(ctx.destination);

        gain.gain.setValueAtTime(
            0.4,
            ctx.currentTime + offset
        );

        gain.gain.exponentialRampToValueAtTime(
            0.01,
            ctx.currentTime + offset + 0.18
        );

        osc.start(
            ctx.currentTime + offset
        );

        osc.stop(
            ctx.currentTime + offset + 0.18
        );

    });

}

function generateUserId(){

    const name =
    document.getElementById(
      "newName"
    ).value.trim();

    const facilitator =
    document.getElementById(
      "newFacilitator"
    ).value.trim();

    const gender =
    document.getElementById(
      "newGender"
    ).value.trim();

    const age =
    document.getElementById(
      "newAge"
    ).value.trim();

    const passcode =
    document.getElementById(
      "newPasscode"
    ).value.trim();

    if(
      !name ||
      !facilitator ||
      !gender ||
      !age ||
      !passcode
    ){

        alert(
          "Please complete all fields."
        );

        return;

    }

    document.getElementById(
      "generateIdBtn"
    ).disabled = true;

    showBusy(
      "Checking existing registrations..."
    );

    fetch(
      API_URL +
      "?action=checkDuplicateUser" +
      "&name=" +
      encodeURIComponent(name) +
      "&facilitator=" +
      encodeURIComponent(facilitator) +
      "&passcode=" +
      encodeURIComponent(passcode)
    )
    .then(r => r.json())
    .then(dupRes => {

        if(
          dupRes.matches &&
          dupRes.matches.length > 0
        ){

            let msg =
            "Possible existing registrations found:\n\n";

            dupRes.matches.forEach(m => {

                msg +=
                m.name +
                " (" +
                m.id +
                ")\n";

            });

            msg +=
            "\nContinue creating a new registration?";

            hideBusy();

            const proceed =
            confirm(msg);

            if(!proceed){

                document.getElementById(
                  "generateIdBtn"
                ).disabled = false;

                return;
            }
        }

        showBusy(
          "Generating User ID..."
        );

        fetch(
          API_URL +
          "?action=generateUserId" +
          "&name=" +
          encodeURIComponent(name) +
          "&facilitator=" +
          encodeURIComponent(facilitator)
        )
        .then(r => r.json())
        .then(res => {

            console.log(res);

            hideBusy();

            document.getElementById(
              "generateIdBtn"
            ).disabled = false;

            if(!res.uniqueId){

                alert(
                  res.error ||
                  "Unable to generate ID"
                );

                return;
            }

            suggestedUserId =
            res.uniqueId;

            document
            .getElementById(
              "generatedId"
            )
            .innerHTML = `
                <h3>
                Generated ID
                </h3>

                <div style="
                    font-size:24px;
                    font-weight:bold;
                    color:#0f9d58;
                ">
                    ${res.uniqueId}
                </div>
            `;

            document
            .getElementById(
              "createUserBtn"
            )
            .disabled = false;

            document
            .getElementById(
              "createUserBtn"
            )
            .style.opacity = "1";

        });

    })
    .catch(err => {

        hideBusy();

        document.getElementById(
          "generateIdBtn"
        ).disabled = false;

        alert(
          "Error: " + err
        );

    });

}

async function restartScanner(){

    try{

        if(html5QrCode){

            try{
                await html5QrCode.stop();
            }catch(e){}

            await html5QrCode.start(
                {
                    facingMode:"environment"
                },
                {
                    fps:10,
                    qrbox:250
                },
                onScanSuccess
            );

        }

    }catch(err){

        console.log(
          "Restart scanner failed",
          err
        );

    }

    isProcessing = false;
    lastScan = "";
    lastScanTime = 0;

}
function createUser(){
    const age =
    parseInt(
      document.getElementById(
        "newAge"
      ).value,
      10
    );

    if(
      isNaN(age) ||
      age <= 5
    ){

        alert(
          "Users aged 5 years or below need not be registered."
        );

        return;
    }

    document.getElementById(
      "createUserBtn"
    ).disabled = true;

    showBusy(
      "Creating User..."
    );

    fetch(
      API_URL +
      "?action=addUser" +
      "&uniqueId=" +
      encodeURIComponent(
        suggestedUserId
      ) +
      "&name=" +
      encodeURIComponent(
        document.getElementById(
          "newName"
        ).value
      ) +
      "&gender=" +
      encodeURIComponent(
        document.getElementById(
          "newGender"
        ).value
      ) +
      "&age=" +
      encodeURIComponent(
        document.getElementById(
          "newAge"
        ).value
      ) +
      "&facilitator=" +
      encodeURIComponent(
        document.getElementById(
          "newFacilitator"
        ).value
      ) +
      "&passcode=" +
      encodeURIComponent(
        document.getElementById(
          "newPasscode"
        ).value
      )
    )
    .then(r => r.json())
    .then(res => {
        hideBusy();

        document.getElementById(
          "createUserBtn"
        ).disabled = false;

        if(res.status !== "CREATED"){

            alert(
              res.error ||
              "User creation failed"
            );

            return;

        }
        playCreated();
        
        closeAddUserModal();
        
        const screen =
        document.getElementById(
          "resultScreen"
        );

        const content =
        document.getElementById(
          "resultContent"
        );

        screen.className =
        "result-screen created";

        content.innerHTML = `

            <div class="big-status">
            ✓ USER CREATED
            </div>

            <div class="info">
            Unique ID
            </div>

            <div
            style="
              font-size:28px;
              font-weight:bold;
              margin-top:10px;
            ">
            ${res.uniqueId}
            </div>

            <br>

            <img
            src="https://quickchart.io/qr?text=${encodeURIComponent(res.uniqueId)}&size=400"
            style="
              width:280px;
              background:white;
              padding:10px;
              border-radius:12px;
            ">

            <br><br>

            <div class="info">
            Take Screenshot and provide QR to user
            </div>

            <br><br>

            <button
            onclick="continueScanning()"
            style="
                padding:16px 40px;
                font-size:22px;
                border:none;
                border-radius:12px;
                background:white;
                color:black;
                font-weight:bold;
                cursor:pointer;
            ">
            CONTINUE
            </button>

        `;

        screen.style.display =
        "flex";

    })
    .catch(err => {

        hideBusy();

        document.getElementById(
          "createUserBtn"
        ).disabled = false;

        alert(
          "Error: " + err
        );

    });

}

function toggleClearButton(fieldId){

    const field =
    document.getElementById(fieldId);

    const btn =
    document.getElementById(fieldId + "Clear");

    btn.style.display =
        field.value.trim() ? "block" : "none";

}

function clearField(fieldId){

    const field =
    document.getElementById(fieldId);

    field.value = "";

    toggleClearButton(fieldId);

    field.focus();

}
